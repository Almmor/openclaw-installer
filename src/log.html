<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安装日志</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #2d2d2d;
            border-bottom: 1px solid #3e3e3e;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #0e639c;
            color: white;
        }

        .btn-primary:hover {
            background: #1177bb;
        }

        .btn-secondary {
            background: #3e3e3e;
            color: #cccccc;
        }

        .btn-secondary:hover {
            background: #4e4e4e;
        }

        .log-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-line {
            margin-bottom: 4px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-line.info {
            color: #d4d4d4;
        }

        .log-line.success {
            color: #4ec9b0;
        }

        .log-line.warning {
            color: #dcdcaa;
        }

        .log-line.error {
            color: #f14c4c;
        }

        .timestamp {
            color: #6a9955;
            margin-right: 8px;
        }

        .log-footer {
            padding: 8px 16px;
            background: #2d2d2d;
            border-top: 1px solid #3e3e3e;
            font-size: 12px;
            color: #808080;
            display: flex;
            justify-content: space-between;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ec9b0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #3e3e3e;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4e4e4e;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 安装日志</h1>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="clearLog()">清空日志</button>
            <button class="btn btn-secondary" onclick="scrollToBottom()">滚动到底部</button>
        </div>
    </div>

    <div class="log-container" id="logContainer">
        <!-- 日志内容将动态添加 -->
    </div>

    <div class="log-footer">
        <div class="status">
            <span class="status-dot"></span>
            <span id="statusText">等待操作...</span>
        </div>
        <div>
            <span id="logCount">0 条日志</span>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const logContainer = document.getElementById('logContainer');
        const statusText = document.getElementById('statusText');
        const logCount = document.getElementById('logCount');
        let logCountNum = 0;

        // 监听日志消息
        ipcRenderer.on('log-message', (event, data) => {
            addLog(data.message, data.type, data.timestamp);
        });

        // 监听清空日志
        ipcRenderer.on('clear-log', () => {
            logContainer.innerHTML = '';
            logCountNum = 0;
            updateLogCount();
        });

        // 添加日志行
        function addLog(message, type = 'info', timestamp = '') {
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            
            if (timestamp) {
                line.innerHTML = `<span class="timestamp">[${timestamp}]</span>${escapeHtml(message)}`;
            } else {
                line.innerHTML = escapeHtml(message);
            }
            
            logContainer.appendChild(line);
            logCountNum++;
            updateLogCount();
            
            // 自动滚动到底部
            logContainer.scrollTop = logContainer.scrollHeight;
            
            // 更新状态
            updateStatus(type, message);
        }

        // 更新状态
        function updateStatus(type, message) {
            if (message.includes('完成') || message.includes('成功') || message.includes('✓')) {
                statusText.textContent = '操作完成';
                statusText.style.color = '#4ec9b0';
            } else if (message.includes('失败') || message.includes('错误') || message.includes('✗')) {
                statusText.textContent = '操作失败';
                statusText.style.color = '#f14c4c';
            } else if (type === 'info') {
                statusText.textContent = '运行中...';
                statusText.style.color = '#dcdcaa';
            }
        }

        // 更新日志计数
        function updateLogCount() {
            logCount.textContent = `${logCountNum} 条日志`;
        }

        // 清空日志
        function clearLog() {
            logContainer.innerHTML = '';
            logCountNum = 0;
            updateLogCount();
            statusText.textContent = '等待操作...';
            statusText.style.color = '#808080';
        }

        // 滚动到底部
        function scrollToBottom() {
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
